<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frontend Sites</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Georgia", serif;
        background: #f3eee6;
        color: #2d241d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(165, 115, 68, 0.12), transparent 24%),
          #f3eee6;
      }

      main {
        width: min(760px, calc(100% - 32px));
        padding: 40px;
        border: 1px solid rgba(58, 42, 28, 0.12);
        background: rgba(255, 251, 246, 0.94);
        box-shadow: 0 24px 60px rgba(84, 62, 38, 0.1);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3.2rem);
      }

      p {
        margin: 0;
        color: #6a5848;
        line-height: 1.7;
      }

      nav {
        display: grid;
        gap: 16px;
        margin-top: 28px;
      }

      a {
        display: block;
        padding: 18px 20px;
        border: 1px solid rgba(58, 42, 28, 0.12);
        color: inherit;
        text-decoration: none;
        background: #fffdf9;
      }

      strong {
        display: block;
        margin-bottom: 6px;
        font-size: 1.1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Frontend Sites</h1>
      <p>이 워크스페이스에는 서로 다른 톤의 두 개의 랜딩 페이지가 포함되어 있습니다.</p>
      <nav>
        <a href="/apps/donggeurami/">
          <strong>동그라미분식</strong>
          기존 분식집 랜딩 페이지
        </a>
        <a href="/apps/testy-market/">
          <strong>testy market</strong>
          문서형 스타일의 로컬 프로듀스 마켓 랜딩 페이지
        </a>
      </nav>
    </main>
  </body>
  </html>
