openapi: 3.0.3
info:
  title: GoogleApi Local OAuth Server
  version: 1.0.0
  description: |
    Local Ktor server for Google OAuth, Google API proxy calls, Google Business Profile account/category/location APIs, and Google Merchant account/product APIs.
servers:
  - url: http://localhost:8088
tags:
  - name: System
    description: Service metadata and local server utility endpoints.
  - name: OAuth
    description: Google OAuth authorization, callback, and token status endpoints.
  - name: Google API
    description: Generic authenticated proxy endpoints for Google REST APIs.
  - name: Business Profile
    description: Google Business Profile account, category, and location endpoints.
  - name: Merchant
    description: Google Merchant account and product endpoints.
paths:
  /:
    get:
      tags:
        - System
      summary: Service metadata
      responses:
        '200':
          description: Root metadata
  /api/v1/auth/google-api/authorize:
    get:
      tags:
        - OAuth
      summary: Start Google OAuth
      description: Redirects the browser to Google OAuth consent.
      parameters:
        - in: query
          name: scopes
          schema:
            type: string
          description: Comma-separated OAuth scopes.
        - in: query
          name: credentialKey
          schema:
            type: string
            default: default
            enum: [default, kge, ljj, hq]
          description: |
            Top-level credential object key from `credentials/google-oauth-client.json`.
            Omit to use the server default (`default`). Override with `GOOGLE_OAUTH_CLIENT_KEY` env var.
      responses:
        '302':
          description: Redirect to Google OAuth
  /api/v1/auth/google-api/redirection:
    get:
      tags:
        - OAuth
      summary: Google OAuth callback
      parameters:
        - in: query
          name: code
          schema:
            type: string
        - in: query
          name: state
          schema:
            type: string
        - in: query
          name: error
          schema:
            type: string
      responses:
        '200':
          description: Token exchange result
  /api/v1/auth/google-api/token:
    get:
      tags:
        - OAuth
      summary: Current token status
      description: |
        Returns the cached OAuth token if the server has completed an authorization flow,
        otherwise returns an `authorized: false` payload that includes an `authorizeUrl`
        the caller can visit to start the OAuth consent flow. The token, when present,
        is the most recently exchanged token regardless of which credential key produced it.
      parameters:
        - in: query
          name: credentialKey
          schema:
            type: string
            default: default
            enum: [default, kge, ljj, hq]
          description: |
            Credential key used to build the `authorizeUrl` returned in the unauthorized response.
            Ignored when a cached token already exists.
      responses:
        '200':
          description: Stored token state
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: Authorized — a token is cached.
                    properties:
                      authorized:
                        type: boolean
                        example: true
                      accessToken:
                        type: string
                      credentialKey:
                        type: string
                        example: default
                      expiresAt:
                        type: integer
                        format: int64
                        description: Token expiration in epoch seconds.
                      hasRefreshToken:
                        type: boolean
                      scopes:
                        type: array
                        items:
                          type: string
                  - type: object
                    description: Unauthorized — no token cached yet.
                    properties:
                      authorized:
                        type: boolean
                        example: false
                      defaultCredentialKey:
                        type: string
                        example: default
                      authorizeUrl:
                        type: string
                        description: URL to begin the OAuth consent flow with the requested credential key.
                      availableCredentialKeys:
                        type: array
                        items:
                          type: string
                        example: [default, hq, kge, ljj]
  /api/v1/google-api/call:
    post:
      tags:
        - Google API
      summary: Proxy any Google REST API call
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  example: https://www.googleapis.com/oauth2/v2/userinfo
                method:
                  type: string
                  example: GET
                headers:
                  type: object
                  additionalProperties:
                    type: string
                body:
                  type: object
      responses:
        '200':
          description: Proxied Google API response
  /api/v1/business-profile/categories:
    get:
      tags:
        - Business Profile
      summary: Business Profile categories.list
      parameters:
        - in: query
          name: regionCode
          required: true
          schema:
            type: string
            example: KR
        - in: query
          name: languageCode
          required: true
          schema:
            type: string
            example: ko
        - in: query
          name: view
          schema:
            type: string
            example: BASIC
        - in: query
          name: searchTerm
          schema:
            type: string
            example: 카페
        - in: query
          name: pageSize
          schema:
            type: integer
        - in: query
          name: pageToken
          schema:
            type: string
      responses:
        '200':
          description: Category list response
        '400':
          description: Missing required query parameters
  /api/v1/business-profile/accounts:
    get:
      tags:
        - Business Profile
      summary: Business Profile accounts.list
      description: Lists Business Profile accounts accessible to the authenticated user.
      parameters:
        - in: query
          name: parentAccount
          schema:
            type: string
            example: "accounts/123456789"
          description: Optional parent account resource name for directly accessible child accounts.
        - in: query
          name: pageSize
          schema:
            type: integer
            example: 20
        - in: query
          name: pageToken
          schema:
            type: string
      responses:
        '200':
          description: Business Profile account list response
  /api/v1/business-profile/categories/batch-get:
    get:
      tags:
        - Business Profile
      summary: Business Profile categories.batchGet
      parameters:
        - in: query
          name: languageCode
          required: true
          schema:
            type: string
            example: ko
        - in: query
          name: view
          schema:
            type: string
            example: FULL
        - in: query
          name: names
          required: true
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
            example:
              - categories/gcid:cafe
              - categories/gcid:restaurant
      responses:
        '200':
          description: Category detail batch response
        '400':
          description: Missing required query parameters
  /api/v1/business-profile/locations:
    get:
      tags:
        - Business Profile
      summary: Business Profile locations list or get
      description: Lists locations for an account, or returns one location if `locationId` is provided.
      parameters:
        - in: query
          name: accountId
          schema:
            type: string
            example: "123456789"
          description: Required when `locationId` is not provided.
        - in: query
          name: locationId
          schema:
            type: string
            example: "12345678901234567890"
          description: Optional. If provided, the endpoint calls `locations.get`.
        - in: query
          name: readMask
          required: true
          schema:
            type: string
            example: "name,title,storeCode,websiteUri"
        - in: query
          name: pageSize
          schema:
            type: integer
        - in: query
          name: pageToken
          schema:
            type: string
        - in: query
          name: filter
          schema:
            type: string
            example: "title=My Store"
        - in: query
          name: orderBy
          schema:
            type: string
            example: "title desc"
      responses:
        '200':
          description: Location list or detail response
        '400':
          description: Missing required query parameters
    patch:
      tags:
        - Business Profile
      summary: Business Profile locations.patch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - locationId
                - updateMask
                - location
              properties:
                locationId:
                  type: string
                  example: "12345678901234567890"
                updateMask:
                  type: string
                  example: "title,websiteUri"
                validateOnly:
                  type: boolean
                location:
                  type: object
      responses:
        '200':
          description: Updated location response
    delete:
      tags:
        - Business Profile
      summary: Business Profile locations.delete
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - locationId
              properties:
                locationId:
                  type: string
                  example: "12345678901234567890"
      responses:
        '200':
          description: Location deleted
  /api/v1/merchant/accounts:
    get:
      tags:
        - Merchant
      summary: Merchant accounts.list
      description: Lists Merchant Center accounts accessible to the authenticated user.
      parameters:
        - in: query
          name: pageSize
          schema:
            type: integer
            example: 50
        - in: query
          name: pageToken
          schema:
            type: string
        - in: query
          name: filter
          schema:
            type: string
            example: "accountName=\"Sample Store\""
      responses:
        '200':
          description: Merchant account list response
  /api/v1/merchant/products:
    get:
      tags:
        - Merchant
      summary: Merchant products list or get
      description: Lists processed Merchant Center products, or returns one product if `productId` is provided.
      parameters:
        - in: query
          name: accountId
          required: true
          schema:
            type: string
            example: "123456789"
        - in: query
          name: productId
          schema:
            type: string
            example: online~en~US~sku123
        - in: query
          name: pageSize
          schema:
            type: integer
        - in: query
          name: pageToken
          schema:
            type: string
      responses:
        '200':
          description: Merchant product response
        '400':
          description: Missing required query parameters
  /api/v1/merchant/product-inputs:
    post:
      tags:
        - Merchant
      summary: Create Merchant product input
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - accountId
                - dataSourceId
                - productInput
              properties:
                accountId:
                  type: string
                dataSourceId:
                  type: string
                productInput:
                  type: object
      responses:
        '200':
          description: Merchant product input created
    patch:
      tags:
        - Merchant
      summary: Update Merchant product input
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - accountId
                - dataSourceId
                - productInputId
                - productInput
              properties:
                accountId:
                  type: string
                dataSourceId:
                  type: string
                productInputId:
                  type: string
                updateMask:
                  type: string
                productInput:
                  type: object
      responses:
        '200':
          description: Merchant product input updated
    delete:
      tags:
        - Merchant
      summary: Delete Merchant product input
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - accountId
                - dataSourceId
                - productInputId
              properties:
                accountId:
                  type: string
                dataSourceId:
                  type: string
                productInputId:
                  type: string
      responses:
        '200':
          description: Merchant product input deleted
